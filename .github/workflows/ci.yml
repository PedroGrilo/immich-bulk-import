name: CI

# Fast validation on every push / PR: type-check + bundle (no packaging).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check renderer
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build (renderer + main + preload)
        run: npm run build
