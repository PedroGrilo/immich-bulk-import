name: Release

# Two ways to cut a release:
#   1. Run this workflow manually (Actions → Release → Run workflow) and pick a
#      version bump. It bumps package.json, commits, tags, builds the app and
#      publishes the GitHub Release — all in one go.
#   2. Push a tag yourself (e.g. `git tag v1.2.3 && git push --follow-tags`).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        default: patch
        options: [patch, minor, major]
      prerelease:
        description: Mark the release as a pre-release
        type: boolean
        default: false
  push:
    tags: ['v*.*.*']

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create tags, commits and releases

jobs:
  release:
    name: Build & publish macOS app
    runs-on: macos-14 # Apple Silicon runner (matches the arm64 target)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version & tag (manual runs)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}" -m "chore(release): v%s"
          # Pushing with GITHUB_TOKEN does not re-trigger the tag workflow,
          # so we keep building in this same run.
          git push origin "HEAD:${{ github.ref_name }}" --follow-tags

      - name: Resolve version
        id: v
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"     >> "$GITHUB_OUTPUT"

      - name: Build & package (.dmg)
        env:
          # Unsigned build — don't let electron-builder hunt for a certificate.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run package

      - name: List artifacts
        run: ls -lh release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: ${{ steps.v.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
          files: |
            release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
