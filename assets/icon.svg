<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b7cff"/>
      <stop offset="0.55" stop-color="#3f5bd6"/>
      <stop offset="1" stop-color="#1e2a63"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
    <clipPath id="photo">
      <rect x="-70" y="-70" width="140" height="140" rx="18"/>
    </clipPath>
  </defs>

  <!-- Glass tile (rounded corners; transparent margin for macOS) -->
  <rect x="80" y="80" width="864" height="864" rx="216" fill="url(#tile)"/>
  <rect x="80" y="80" width="864" height="864" rx="216" fill="url(#sheen)"/>
  <rect x="83" y="83" width="858" height="858" rx="213" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6"/>

  <!-- Photo stack -->
  <g transform="translate(464 452) scale(2)">
    <rect x="-78" y="-78" width="156" height="156" rx="30" fill="#b7a6ff" transform="rotate(-16)"/>
    <rect x="-80" y="-80" width="160" height="160" rx="30" fill="#8fb0ff" transform="rotate(-8)"/>
    <rect x="-84" y="-84" width="168" height="168" rx="30" fill="#f7fafc"/>
    <g clip-path="url(#photo)">
      <rect x="-70" y="-70" width="140" height="140" fill="#eaf1f8"/>
      <circle cx="-28" cy="-30" r="20" fill="#f5b301"/>
      <path d="M-70 70 L-14 4 L26 46 L70 -4 L70 70 Z" fill="url(#mtn)"/>
      <path d="M-70 70 L4 18 L44 70 Z" fill="#22c55e" opacity="0.85"/>
    </g>
  </g>

  <!-- Import arrow badge -->
  <g transform="translate(692 700) scale(2)">
    <circle cx="0" cy="0" r="66" fill="#ffffff"/>
    <circle cx="0" cy="0" r="66" fill="url(#sheen)"/>
    <path d="M-26 0 H20 M4 -18 L26 0 L4 18" stroke="url(#arrow)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
